<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kontrola P0 v2</title>
<style>
body{margin:0;background:#f6efe5;font-family:Arial,sans-serif;color:#241d19}
header{padding:30px 40px;background:#fffaf1}
.qa{width:min(1700px,calc(100% - 40px));margin:24px auto;padding:20px;background:#fff;border:1px solid #e6dacd;border-radius:18px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
figure{margin:0;border:1px solid #e8ded3;border-radius:12px;overflow:hidden;background:#fff}
img{display:block;width:100%;height:auto}
figcaption{font-size:13px;padding:8px 10px;border-top:1px solid #e8ded3}
@media(max-width:1200px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Kontrola P0 - baza PDF + poprawiona maska PDF</h1><p><a href="index.html">Otwórz interaktywną mapę</a></p></header>
<section class="qa">
<div class="grid">
<figure><img src="assets/p0-baza-render.png"><figcaption>Render z _baza.pdf</figcaption></figure>
<figure><img src="assets/p0-maska-render.png"><figcaption>Render z poprawionej _maska.pdf</figcaption></figure>
<figure><img src="overlays/p0-overlay-on-base.png"><figcaption>Fill bez stroke i bez numerów</figcaption></figure>
<figure><img src="overlays/p0-control-mask-plus-overlay.png"><figcaption>Kontrola: maska + overlay</figcaption></figure>
</div>
</section>
</body>
</html>
